---
name: Deploy

# yamllint disable-line rule:truthy
on:
  release:
    types:
      - published
  workflow_run:
    workflows: ["CI"]
    branches: [main]
    types:
      - completed

jobs:
  workflows:
    uses: hassio-addons/workflows/.github/workflows/addon-deploy.yaml@main
    with:
      repository: hassio-addons_repository
      repository_edge: hassio-addons_repository
      repository_beta: hassio-addons_repository
    secrets:
      DISPATCH_TOKEN: ${{ secrets.DISPATCH_TOKEN }}
